       <script LANGUAGE="javaScript">
        function validacao(){
            /* Validação e senha da usuário */
           
            var user1 = document.login.user.value;
            var pass = document.login.senha.value;
            
            /*teste da senha (321)*/
            if (pass == 321){
                window.open("home.html");
                 
                return 1;
            } /* if da senha */
            else {
                alert("Usuário ou senha incorretos! Tente novamente!");
                document.login.user.value="".value;
                document.login.senha.value="";
            } /* else da senha */
        } /* chave principal */
